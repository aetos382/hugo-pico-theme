title = 'pico-theme'
copyright = 'Copyright (c) 2026 - aetos'
defaultContentLanguage = 'ja'
locale = 'ja'
timeZone = 'Asia/Tokyo'
hasCJKLanguage = true
enableRobotsTXT = false
enableGitInfo = true
cleanDestinationDir = true

[security]
  [security.exec]
    allow =[ '^asciidoctor$', '^git$', '^go$', '^sass$', '^npx$' ]
    osEnv = [ '(?i)^(PATH)$' ]

[frontmatter]
  lastmod = ['lastmod', ':git', ':fileModTime', ':default']

[permalinks]
  [permalinks.page]
    post = '/post/:year/:month/:day/:slug'

[taxonomies]
  tag = 'tags'
